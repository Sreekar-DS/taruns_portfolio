<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}

    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% if page.url == '/' %}
    <script src="{{ '/assets/js/portfolio-data.js' | relative_url }}?v={{ site.github.build_revision }}" defer></script>
    {% endif %}
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body class="{% if page.url == '/' %}home-dashboard-page{% else %}portfolio-inner-page page-{{ page.title | slugify }}{% endif %}">
    <div class="analytics-background" aria-hidden="true">
      <div class="analytics-grid"></div>
      <div class="analytics-orb analytics-orb-one"></div>
      <div class="analytics-orb analytics-orb-two"></div>

      <div class="analytics-bars analytics-widget">
        <span style="--height: 42%; --delay: 0s;"></span>
        <span style="--height: 70%; --delay: .25s;"></span>
        <span style="--height: 52%; --delay: .5s;"></span>
        <span style="--height: 86%; --delay: .75s;"></span>
        <span style="--height: 62%; --delay: 1s;"></span>
      </div>

      <div class="analytics-pie analytics-widget"></div>

      <div class="analytics-scatter analytics-widget">
        <span style="--x: 10%; --y: 68%; --delay: 0s;"></span>
        <span style="--x: 23%; --y: 42%; --delay: .4s;"></span>
        <span style="--x: 39%; --y: 76%; --delay: .8s;"></span>
        <span style="--x: 51%; --y: 34%; --delay: 1.2s;"></span>
        <span style="--x: 66%; --y: 58%; --delay: 1.6s;"></span>
        <span style="--x: 82%; --y: 26%; --delay: 2s;"></span>
      </div>
    </div>

    <nav class="navbar" aria-label="Primary navigation">
      <ul>
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="nav-active" aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="nav-active" aria-current="page"{% endif %}>About</a></li>
        <li><a href="{{ '/experience/' | relative_url }}"{% if page.url == '/experience/' %} class="nav-active" aria-current="page"{% endif %}>Experience</a></li>
        <li><a href="{{ '/education/' | relative_url }}"{% if page.url == '/education/' %} class="nav-active" aria-current="page"{% endif %}>Education</a></li>
        <li><a href="{{ '/projects/' | relative_url }}"{% if page.url == '/projects/' %} class="nav-active" aria-current="page"{% endif %}>Projects</a></li>
        <li><a href="{{ '/skills/' | relative_url }}"{% if page.url == '/skills/' %} class="nav-active" aria-current="page"{% endif %}>Skills</a></li>
        <li><a href="{{ '/certifications/' | relative_url }}"{% if page.url == '/certifications/' %} class="nav-active" aria-current="page"{% endif %}>Certifications</a></li>
        <li><a href="{{ '/professional development/' | relative_url }}"{% if page.url == '/professional development/' %} class="nav-active" aria-current="page"{% endif %}>Professional Development</a></li>
        <li><a href="{{ '/publication/' | relative_url }}"{% if page.url == '/publication/' %} class="nav-active" aria-current="page"{% endif %}>Publication</a></li>
      </ul>
    </nav>

    <div class="wrapper{% if page.url == '/' %} dashboard-wrapper{% else %} inner-page-wrapper{% endif %}">
      <section class="{% if page.url == '/' %}dashboard-content{% else %}inner-page-content{% endif %}">
        {{ content }}
      </section>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
